<div id="view-settings">
    <h2>General Settings</h2>
    <form id="general-settings-form">
        <label for="app-name">App Name:</label>
        <input type="text" id="app-name" name="app-name" required>

        <label for="language">Language:</label>
        <select id="language" name="language">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
        </select>

        <label for="theme-color">Theme Color:</label>
        <input type="color" id="theme-color" name="theme-color">

        <button type="submit">Save Settings</button>
    </form>

    <h2>Tax Settings</h2>
    <form id="tax-settings-form">
        <label for="tax-rate">Tax Rate:</label>
        <input type="number" id="tax-rate" name="tax-rate" required min="0" max="100">
    </form>

    <h2>System Settings</h2>
    <form id="system-settings-form">
        <label for="system-language">System Language:</label>
        <input type="text" id="system-language" name="system-language" required>
    </form>

    <h2>Appearance Settings</h2>
    <form id="appearance-settings-form">
        <label for="theme-color-picker">Theme Color Picker:</label>
        <input type="color" id="theme-color-picker" name="theme-color-picker">
    </form>
</div>

<script>
    function saveSettings() {
        // Logic for saving settings goes here
        console.log('Settings saved!');
    }

    document.getElementById('general-settings-form').addEventListener('submit', function(event) {
        event.preventDefault();
        saveSettings();
    });
</script>
